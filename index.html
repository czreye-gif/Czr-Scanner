<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner — Despacho</title>
<style>
  :root{
    --ink:#14161a; --paper:#fbfaf7; --line:#d8d2c4;
    --sello:#1f5c4d; --sello-soft:#e6efe9;
    --warn:#9a4a2f; --muted:#6b665c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  /* ---- header: como el membrete de un sello fiscal ---- */
  header{
    border-bottom:2px solid var(--ink);
    padding:18px 20px 14px;
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
  }
  .brand{display:flex; flex-direction:column}
  .brand h1{
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
    font-size:15px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
  }
  .brand span{font-size:11px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase}
  .folio{
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
    font-size:11px; color:var(--sello); border:1px solid var(--sello);
    padding:3px 8px; border-radius:2px; white-space:nowrap;
  }
  main{max-width:760px; margin:0 auto; padding:18px 16px 80px}

  .field{margin-bottom:14px}
  label.lbl{
    display:block; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:6px;
  }
  input[type=text]{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px;
    font-family:"SF Mono",ui-monospace,monospace; font-size:14px; background:#fff;
    text-transform:uppercase; letter-spacing:.05em;
  }
  input[type=text]:focus{outline:none; border-color:var(--sello); box-shadow:0 0 0 3px var(--sello-soft)}

  .stage{
    border:1px solid var(--line); border-radius:4px; background:#000;
    margin:0 auto; overflow:hidden; position:relative;
    display:flex; align-items:center; justify-content:center;
    width:100%;
  }
  .stage video,.stage img{display:block; width:100%; height:auto; max-height:64vh; object-fit:contain}
  .stage #work{display:none}
  #overlay{position:absolute; pointer-events:none}

  /* ---- vista revisión ---- */
  .rev-banner{
    font-family:"SF Mono",ui-monospace,monospace; font-size:12px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--sello); background:var(--sello-soft);
    border:1px solid var(--sello); border-radius:3px; padding:8px 12px; margin-bottom:12px;
    text-align:center;
  }
  .rev-stage{
    border:1px solid var(--line); border-radius:4px; background:#f0ede4;
    padding:12px; display:flex; justify-content:center; align-items:center;
    margin-bottom:12px; min-height:50vh;
  }
  .rev-stage img{
    display:block; max-width:100%; max-height:62vh; width:auto; height:auto;
    box-shadow:0 2px 18px rgba(0,0,0,.22); background:#fff;
  }
  .rev-stage img.hidden{display:block}
  .filters{display:flex; gap:8px; margin-bottom:12px}
  .f-btn{
    flex:1; padding:9px; border:1px solid var(--line); background:#fff; border-radius:3px;
    font-size:12px; font-weight:600; letter-spacing:.04em; cursor:pointer; color:var(--muted);
  }
  .f-btn.f-active{background:var(--ink); color:var(--paper); border-color:var(--ink)}
  #btnFlash{flex:0 0 110px; min-width:0}
  #btnFlash.f-active{background:var(--sello); color:#fff; border-color:var(--sello)}
  .stage .ph{color:#777; font-size:13px; padding:40px 24px; text-align:center}

  .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
  button{
    flex:1; min-width:130px; padding:13px 14px; border:none; border-radius:3px;
    font-size:13px; font-weight:600; letter-spacing:.03em; cursor:pointer;
    font-family:inherit; transition:transform .04s, background .15s;
  }
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.4; cursor:not-allowed}
  .b-primary{background:var(--ink); color:var(--paper)}
  .b-sello{background:var(--sello); color:#fff}
  .b-ghost{background:#fff; color:var(--ink); border:1px solid var(--line)}

  .pages{margin-top:18px}
  .pages h2{
    font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
    border-bottom:1px solid var(--line); padding-bottom:6px; margin-bottom:10px;
    display:flex; justify-content:space-between;
  }
  .thumbs{display:flex; gap:8px; flex-wrap:wrap}
  .thumb{position:relative; width:84px; height:112px; border:1px solid var(--line); border-radius:3px; overflow:hidden; background:#fff}
  .thumb img{width:100%; height:100%; object-fit:cover}
  .thumb .num{
    position:absolute; top:0; left:0; background:var(--ink); color:var(--paper);
    font-family:"SF Mono",monospace; font-size:10px; padding:1px 5px; border-bottom-right-radius:3px;
  }
  .thumb .del{
    position:absolute; bottom:2px; right:2px; background:var(--warn); color:#fff;
    border:none; width:20px; height:20px; border-radius:50%; font-size:12px; cursor:pointer;
    line-height:1; padding:0; flex:none; min-width:0;
  }
  .toggle{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); margin-top:12px}
  .toggle input{width:16px; height:16px; accent-color:var(--sello)}
  .status{
    font-family:"SF Mono",monospace; font-size:12px; color:var(--sello);
    min-height:18px; margin-top:10px;
  }
  .status.err{color:var(--warn)}
  footer{
    position:fixed; bottom:0; left:0; right:0; background:var(--paper);
    border-top:2px solid var(--ink); padding:10px 16px;
  }
  footer .inner{max-width:760px; margin:0 auto; display:flex; gap:10px}
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Escáner · Despacho</h1>
    <span>Documentos → PDF</span>
  </div>
  <div class="folio" id="folio">FOLIO —</div>
</header>

<main>
  <div class="field">
    <label class="lbl" for="rfc">RFC / Cliente (nombra el archivo)</label>
    <input type="text" id="rfc" placeholder="XAXX010101000" maxlength="13" autocomplete="off">
  </div>

  <!-- ===== VISTA CÁMARA ===== -->
  <section id="viewCam">
    <div class="stage" id="stage">
      <span class="ph" id="ph">Activa la cámara o sube una foto del documento.</span>
      <video id="video" class="hidden" playsinline></video>
      <canvas id="overlay" class="hidden"></canvas>
      <canvas id="work" class="hidden"></canvas>
    </div>

    <div class="row">
      <button class="b-sello" id="btnCam">Activar cámara</button>
      <button class="b-ghost" id="btnFile">Subir foto</button>
      <input type="file" id="file" accept="image/*" class="hidden">
    </div>
    <div class="row">
      <button class="b-primary" id="btnShot" disabled>Capturar página</button>
      <button class="b-ghost" id="btnFlash" disabled>🔦 Flash</button>
    </div>

    <label class="toggle">
      <input type="checkbox" id="auto" checked> Autocaptura — dispara solo cuando el documento está quieto
    </label>
    <label class="toggle">
      <input type="checkbox" id="ocr"> Reconocer texto (OCR) — hace el PDF buscable, tarda más
    </label>

    <div class="pages hidden" id="pagesBox">
      <h2><span>Páginas capturadas</span><span id="count">0</span></h2>
      <div class="thumbs" id="thumbs"></div>
    </div>
  </section>

  <!-- ===== VISTA REVISIÓN ===== -->
  <section id="viewReview" class="hidden">
    <div class="rev-banner" id="revBanner">Página 1 lista</div>
    <div class="rev-stage">
      <img id="preview" alt="Página capturada">
    </div>
    <div class="filters">
      <button class="f-btn" id="f-color">Color</button>
      <button class="f-btn f-active" id="f-gris">Gris</button>
      <button class="f-btn" id="f-byn">B/N texto</button>
    </div>
    <div class="row">
      <button class="b-ghost" id="btnRetake">↺ Rehacer</button>
      <button class="b-primary" id="btnMore">+ Otra página</button>
    </div>
    <div class="row">
      <button class="b-sello" id="btnFinish">Terminar y generar PDF</button>
    </div>
    <div class="rev-thumbs-wrap pages hidden" id="revPagesBox">
      <h2><span>Páginas</span><span id="revCount">0</span></h2>
      <div class="thumbs" id="revThumbs"></div>
    </div>
  </section>

  <div class="status" id="status"></div>
</main>

<footer>
  <div class="inner">
    <button class="b-ghost" id="btnClear" disabled>Vaciar</button>
    <button class="b-sello" id="btnPdf" disabled>Generar PDF</button>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script>
/* ---------- estado ---------- */
const pages = []; // {dataUrl, w, h}
let stream = null;
let cvReady = false;

const $ = id => document.getElementById(id);
const stage=$('stage'), ph=$('ph'), video=$('video'), work=$('work'), preview=$('preview');
const status=$('status');

function setStatus(msg, err=false){ status.textContent=msg; status.className='status'+(err?' err':''); }
$('folio').textContent = 'FOLIO ' + new Date().toISOString().slice(0,10).replace(/-/g,'');

/* ---------- OpenCV carga diferida (solo si se necesita) ---------- */
function loadCV(){
  return new Promise((res,rej)=>{
    if(cvReady) return res();
    setStatus('Cargando motor de detección…');
    const sources=[
      'https://docs.opencv.org/4.10.0/opencv.js',
      'https://docs.opencv.org/4.8.0/opencv.js',
      'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js'
    ];
    let idx=0;
    const ready=()=>{
      if(window.cv && cv.getBuildInformation){ cvReady=true; setStatus(''); res(); }
      else { cv['onRuntimeInitialized']=()=>{ cvReady=true; setStatus(''); res(); }; }
    };
    const tryNext=()=>{
      if(idx>=sources.length){ rej(new Error('No se pudo cargar OpenCV desde ninguna fuente')); return; }
      const s=document.createElement('script');
      s.src=sources[idx++];
      s.onload=ready;
      s.onerror=()=>{ setStatus('Reintentando con otra fuente…'); tryNext(); };
      document.body.appendChild(s);
    };
    tryNext();
  });
}

/* ---------- cámara ---------- */
let liveTimer=null, lastQuad=null;

$('btnCam').onclick = async ()=>{
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment'}, audio:false
    });
    video.srcObject = stream; await video.play();
    ph.classList.add('hidden');
    video.classList.remove('hidden');
    $('overlay').classList.remove('hidden');
    $('btnShot').disabled=false;
    setupTorch();
    setStatus('Cámara lista. Cargando guía de bordes…');
    loadCV().then(startLive).catch(()=> setStatus('Cámara lista (sin guía en vivo). Igual puedes capturar.'));
  }catch(e){ setStatus('No se pudo abrir la cámara. Usa "Subir foto".', true); }
};

/* detección continua para el marco guía verde */
function startLive(){
  setStatus('Encuadra el documento — el marco verde indica que lo detecté.');
  const ov=$('overlay'), octx=ov.getContext('2d');
  if(liveTimer) clearInterval(liveTimer);
  liveTimer=setInterval(()=>{
    if(video.classList.contains('hidden')||!video.videoWidth) return;

    // rectángulo REAL que ocupa el frame dentro del elemento <video> (object-fit:contain)
    const vw=video.videoWidth, vh=video.videoHeight;
    const ew=video.clientWidth, eh=video.clientHeight;
    const r=Math.min(ew/vw, eh/vh);          // escala de contain
    const dw=vw*r, dh=vh*r;                   // tamaño pintado
    const offX=(ew-dw)/2, offY=(eh-dh)/2;     // franjas (letterbox)

    // colocar y dimensionar el overlay justo sobre el área pintada
    ov.style.left=(video.offsetLeft+offX)+'px';
    ov.style.top=(video.offsetTop+offY)+'px';
    ov.style.width=dw+'px'; ov.style.height=dh+'px';
    ov.width=dw; ov.height=dh;

    const quad=detectQuadLive();
    octx.clearRect(0,0,ov.width,ov.height);
    if(quad){
      lastQuad=quad;
      const stable=isStable(quad);
      const col=stable ? '#19c37d' : '#e0a23c'; // verde estable / ámbar moviéndose
      octx.beginPath();
      quad.forEach((p,i)=>{ const x=p.x*r,y=p.y*r; i?octx.lineTo(x,y):octx.moveTo(x,y); });
      octx.closePath();
      octx.strokeStyle=col; octx.lineWidth=3; octx.stroke();
      octx.fillStyle=stable?'rgba(25,195,125,0.16)':'rgba(224,162,60,0.12)'; octx.fill();

      // ---- autocaptura ----
      if($('auto').checked && stable){
        stableCount++;
        if(stableCount===2) setStatus('Documento estable… capturando.');
        if(stableCount>=3){ // ~3 ciclos quieto ≈ 1 s
          stableCount=0; prevQuad=null;
          $('btnShot').click();
        }
      } else stableCount=0;
    } else { lastQuad=null; stableCount=0; }
  }, 350);
}

/* mide si el cuadrilátero casi no se movió respecto al frame anterior */
let prevQuad=null, stableCount=0;
function isStable(quad){
  if(!prevQuad){ prevQuad=quad; return false; }
  let move=0;
  for(let i=0;i<4;i++) move+=Math.hypot(quad[i].x-prevQuad[i].x, quad[i].y-prevQuad[i].y);
  prevQuad=quad;
  return move < 40; // umbral de movimiento total en px (sobre frame full)
}

/* detección ligera sobre frame reducido (rápida para el bucle) */
function detectQuadLive(){
  const scale=600/video.videoWidth;
  const tw=600, th=Math.round(video.videoHeight*scale);
  work.width=tw; work.height=th;
  work.getContext('2d').drawImage(video,0,0,tw,th);
  let img=cv.imread(work), gray=new cv.Mat(), edges=new cv.Mat();
  cv.cvtColor(img,gray,cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray,gray,new cv.Size(5,5),0);
  cv.Canny(gray,edges,50,150);
  cv.dilate(edges,edges,cv.Mat.ones(3,3,cv.CV_8U));
  let contours=new cv.MatVector(), hier=new cv.Mat();
  cv.findContours(edges,contours,hier,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);
  let quad=null, bestArea=tw*th*0.15;
  for(let i=0;i<contours.size();i++){
    const c=contours.get(i), peri=cv.arcLength(c,true), ap=new cv.Mat();
    cv.approxPolyDP(c,ap,0.02*peri,true);
    const area=Math.abs(cv.contourArea(ap));
    if(ap.rows===4 && area>bestArea){
      bestArea=area;
      quad=[]; for(let k=0;k<4;k++) quad.push({x:ap.data32S[k*2]/scale, y:ap.data32S[k*2+1]/scale});
    }
    ap.delete(); c.delete();
  }
  img.delete();gray.delete();edges.delete();contours.delete();hier.delete();
  return quad;
}

function stopLive(){ if(liveTimer){clearInterval(liveTimer); liveTimer=null;} prevQuad=null; stableCount=0; $('overlay').classList.add('hidden'); }

/* ---------- flash / linterna ---------- */
let torchOn=false;
function setupTorch(){
  const track=stream && stream.getVideoTracks()[0];
  const caps=track && track.getCapabilities ? track.getCapabilities() : {};
  if(caps && caps.torch){
    $('btnFlash').disabled=false;
  } else {
    $('btnFlash').disabled=true;
    $('btnFlash').title='Tu dispositivo/navegador no permite controlar el flash aquí';
  }
}
$('btnFlash').onclick=async ()=>{
  const track=stream && stream.getVideoTracks()[0];
  if(!track) return;
  try{
    torchOn=!torchOn;
    await track.applyConstraints({advanced:[{torch:torchOn}]});
    $('btnFlash').classList.toggle('f-active', torchOn);
    $('btnFlash').textContent = torchOn ? '🔦 Flash on' : '🔦 Flash';
  }catch(e){ setStatus('No se pudo cambiar el flash en este equipo.', true); }
};

/* ---------- subir archivo ---------- */
$('btnFile').onclick = ()=> $('file').click();
$('file').onchange = (e)=>{
  const f=e.target.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=> processSource(img, img.naturalWidth, img.naturalHeight);
  img.src=URL.createObjectURL(f);
};

/* ---------- capturar de la cámara ---------- */
$('btnShot').onclick = ()=>{
  if(video.classList.contains('hidden')) return;
  stopLive();
  processSource(video, video.videoWidth, video.videoHeight);
};

/* ---------- pipeline: detectar bordes + enderezar + limpiar ---------- */
async function processSource(src, w, h){
  try{
    await loadCV();
    setStatus('Procesando…');
    work.width=w; work.height=h;
    work.getContext('2d').drawImage(src,0,0,w,h);

    let img = cv.imread(work);
    let gray=new cv.Mat(), blur=new cv.Mat(), edges=new cv.Mat();
    cv.cvtColor(img, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
    cv.Canny(blur, edges, 60, 180);
    cv.dilate(edges, edges, cv.Mat.ones(3,3,cv.CV_8U));

    let contours=new cv.MatVector(), hier=new cv.Mat();
    cv.findContours(edges, contours, hier, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

    let best=null, bestArea=w*h*0.18; // mínimo 18% del cuadro
    for(let i=0;i<contours.size();i++){
      const c=contours.get(i), peri=cv.arcLength(c,true), approx=new cv.Mat();
      cv.approxPolyDP(c, approx, 0.02*peri, true);
      const area=Math.abs(cv.contourArea(approx));
      if(approx.rows===4 && area>bestArea){ if(best)best.delete(); best=approx; bestArea=area; }
      else approx.delete();
      c.delete();
    }

    let outCanvas;
    if(best){
      outCanvas = warp(img, best); // enderezar a rectángulo
      best.delete();
    }else{
      outCanvas = document.createElement('canvas');
      outCanvas.width=w; outCanvas.height=h;
      outCanvas.getContext('2d').drawImage(src,0,0,w,h);
      setStatus('No detecté bordes claros — guardé la imagen completa.');
    }

    // guardamos el ORIGINAL a color; los filtros se aplican luego en revisión
    addPage(outCanvas, best ? true : false);
    img.delete(); gray.delete(); blur.delete(); edges.delete(); contours.delete(); hier.delete();
  }catch(e){ setStatus('Error al procesar: '+e.message, true); }
}

/* corrección de perspectiva a partir de 4 esquinas */
function warp(img, quad){
  const pts=[]; for(let i=0;i<4;i++) pts.push({x:quad.data32S[i*2], y:quad.data32S[i*2+1]});
  pts.sort((a,b)=>a.y-b.y);
  const top=pts.slice(0,2).sort((a,b)=>a.x-b.x);
  const bot=pts.slice(2,4).sort((a,b)=>a.x-b.x);
  const [tl,tr]=top,[bl,br]=bot;
  const dist=(p,q)=>Math.hypot(p.x-q.x,p.y-q.y);
  const W=Math.max(dist(tl,tr),dist(bl,br))|0;
  const H=Math.max(dist(tl,bl),dist(tr,br))|0;
  const srcM=cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
  const dstM=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,W,0,W,H,0,H]);
  const M=cv.getPerspectiveTransform(srcM,dstM), dst=new cv.Mat();
  cv.warpPerspective(img,dst,M,new cv.Size(W,H));
  const cnv=document.createElement('canvas'); cv.imshow(cnv,dst);
  srcM.delete();dstM.delete();M.delete();dst.delete();
  return cnv;
}

/* ---------- filtros de color ---------- */
// devuelve un nuevo canvas con el filtro aplicado sobre el canvas original a color
function applyFilter(srcCanvas, mode){
  if(mode==='color'){
    const c=document.createElement('canvas');
    c.width=srcCanvas.width; c.height=srcCanvas.height;
    c.getContext('2d').drawImage(srcCanvas,0,0);
    return c;
  }
  // gris y byn usan OpenCV para quitar sombra (normalización de fondo)
  if(window.cv && cv.imread){
    try{ return cvFilter(srcCanvas, mode); }
    catch(e){ /* si falla cv, cae al método simple */ }
  }
  return simpleFilter(srcCanvas, mode);
}

// quita sombra dividiendo entre el fondo desenfocado, luego gris o binariza
function cvFilter(srcCanvas, mode){
  let src=cv.imread(srcCanvas), gray=new cv.Mat();
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

  // estimar iluminación de fondo con desenfoque grande y dividir => quita sombras
  let bg=new cv.Mat(), norm=new cv.Mat();
  let k=Math.max(31, (Math.min(gray.cols,gray.rows)/8|0)|1); // kernel impar grande
  cv.medianBlur(gray, bg, k>101?101:k);
  // norm = gray / bg * 255  (corrige iluminación dispareja)
  gray.convertTo(gray, cv.CV_32F);
  bg.convertTo(bg, cv.CV_32F);
  cv.divide(gray, bg, norm, 255);
  norm.convertTo(norm, cv.CV_8U);

  let out=new cv.Mat();
  if(mode==='gris'){
    // leve contraste extra
    norm.convertTo(out, cv.CV_8U, 1.15, -10);
  } else { // byn: umbral adaptativo (ideal para texto con sombras)
    cv.adaptiveThreshold(norm, out, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 25, 12);
  }
  const cnv=document.createElement('canvas'); cv.imshow(cnv, out);
  src.delete(); gray.delete(); bg.delete(); norm.delete(); out.delete();
  return cnv;
}

// respaldo sin OpenCV
function simpleFilter(srcCanvas, mode){
  const c=document.createElement('canvas');
  c.width=srcCanvas.width; c.height=srcCanvas.height;
  const ctx=c.getContext('2d'); ctx.drawImage(srcCanvas,0,0);
  const d=ctx.getImageData(0,0,c.width,c.height), p=d.data;
  if(mode==='gris'){
    for(let i=0;i<p.length;i+=4){
      let g=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
      g=(g-128)*1.25+128+8; g=g<0?0:g>255?255:g;
      p[i]=p[i+1]=p[i+2]=g;
    }
  } else {
    for(let i=0;i<p.length;i+=4){
      let g=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
      g=(g-128)*1.9+138; const v=g>128?255:0;
      p[i]=p[i+1]=p[i+2]=v;
    }
  }
  ctx.putImageData(d,0,0);
  return c;
}

/* ---------- cambio de vistas ---------- */
function showCam(){
  $('viewReview').classList.add('hidden');
  $('viewCam').classList.remove('hidden');
}
function showReview(){
  $('viewCam').classList.add('hidden');
  $('viewReview').classList.remove('hidden');
}

/* ---------- gestión de páginas ---------- */
let currentFilter='gris'; // filtro por defecto para texto fiscal

// recalcula el dataUrl de una página según su filtro y refresca preview/thumbs
function renderPageFilter(i){
  const pg=pages[i];
  const filtered=applyFilter(pg.canvas, pg.filter);
  pg.dataUrl=filtered.toDataURL('image/jpeg',0.85);
  pg.w=filtered.width; pg.h=filtered.height;
}

function addPage(srcCanvas, enderezada){
  const pg={canvas:srcCanvas, filter:currentFilter, dataUrl:'', w:0, h:0};
  pages.push(pg);
  renderPageFilter(pages.length-1);
  stopLive();
  preview.src=pg.dataUrl;
  $('revBanner').textContent='Página '+pages.length+(enderezada?' · enderezada':'');
  markFilterButtons(pg.filter);
  renderThumbs();
  showReview();
  setStatus('Revisa la página. Cambia el filtro si hace falta.');
}

// aplica filtro a la página que se está revisando (la última)
function setReviewFilter(mode){
  if(!pages.length) return;
  const i=pages.length-1;
  pages[i].filter=mode; currentFilter=mode;
  renderPageFilter(i);
  preview.src=pages[i].dataUrl;
  markFilterButtons(mode);
  renderThumbs();
}
function markFilterButtons(mode){
  ['color','gris','byn'].forEach(m=>{
    const b=$('f-'+m); if(b) b.classList.toggle('f-active', m===mode);
  });
}
['color','gris','byn'].forEach(m=>{
  const b=$('f-'+m); if(b) b.onclick=()=>setReviewFilter(m);
});

function renderThumbs(){
  $('count').textContent=pages.length;
  $('revCount').textContent=pages.length;
  [['pagesBox','thumbs'],['revPagesBox','revThumbs']].forEach(([boxId,tId])=>{
    const box=$(boxId), t=$(tId);
    box.classList.toggle('hidden', pages.length===0);
    t.innerHTML='';
    pages.forEach((pg,i)=>{
      const d=document.createElement('div'); d.className='thumb';
      d.innerHTML=`<span class="num">${String(i+1).padStart(2,'0')}</span><img src="${pg.dataUrl}">`;
      const x=document.createElement('button'); x.className='del'; x.textContent='×';
      x.onclick=()=>{ pages.splice(i,1); renderThumbs(); if(pages.length===0) showCam(); };
      d.appendChild(x); t.appendChild(d);
    });
  });
  const has=pages.length>0;
  $('btnPdf').disabled=!has; $('btnClear').disabled=!has;
}

/* ---- botones de la vista revisión ---- */
$('btnRetake').onclick=()=>{           // descarta la última y vuelve a la cámara
  pages.pop(); renderThumbs(); showCam();
  restartCamera();
  setStatus('Página descartada. Vuelve a capturar.');
};
$('btnMore').onclick=()=>{             // conserva y vuelve a la cámara para otra
  showCam(); restartCamera();
  setStatus('Página guardada. Captura la siguiente.');
};
$('btnFinish').onclick=()=>{ $('btnPdf').click(); };

async function restartCamera(){
  // reactiva el video si se detuvo, sin re-pedir permiso si ya hay stream vivo
  try{
    if(!stream || !stream.active){
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    }
    video.srcObject=stream; await video.play();
    video.classList.remove('hidden'); $('overlay').classList.remove('hidden'); ph.classList.add('hidden');
    $('btnShot').disabled=false;
    setupTorch();
    loadCV().then(startLive).catch(()=>{});
  }catch(e){ setStatus('Reactiva la cámara con el botón.', true); }
}

$('btnClear').onclick=()=>{ pages.length=0; renderThumbs(); showCam(); setStatus('Vaciado.'); };

/* ---------- generar PDF ---------- */
$('btnPdf').onclick = async ()=>{
  if(!pages.length) return;
  const { jsPDF } = window.jspdf;
  const rfc=($('rfc').value.trim()||'documento').replace(/[^A-Za-z0-9]/g,'');
  $('btnPdf').disabled=true;

  let ocrText='';
  if($('ocr').checked){
    setStatus('Reconociendo texto… (puede tardar)');
    try{
      const worker=await Tesseract.createWorker('spa');
      for(let i=0;i<pages.length;i++){
        setStatus(`OCR página ${i+1}/${pages.length}…`);
        const r=await worker.recognize(pages[i].dataUrl);
        ocrText+='\n\n=== Página '+(i+1)+' ===\n'+r.data.text;
      }
      await worker.terminate();
    }catch(e){ setStatus('OCR falló, genero PDF sin texto.', true); }
  }

  setStatus('Armando PDF…');
  const pdf=new jsPDF({unit:'pt',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(), pmh=pdf.internal.pageSize.getHeight(), m=24;
  pages.forEach((pg,i)=>{
    if(i>0) pdf.addPage();
    const maxW=pw-m*2, maxH=pmh-m*2;
    let r=Math.min(maxW/pg.w, maxH/pg.h);
    const dw=pg.w*r, dh=pg.h*r;
    pdf.addImage(pg.dataUrl,'JPEG',(pw-dw)/2,(pmh-dh)/2,dw,dh);
  });
  if(ocrText.trim()){
    pdf.addPage();
    pdf.setFont('courier','normal'); pdf.setFontSize(9);
    pdf.text('TEXTO RECONOCIDO (OCR)',m,m+6);
    pdf.setFontSize(8);
    pdf.text(pdf.splitTextToSize(ocrText.trim(), pw-m*2), m, m+24);
  }
  const stamp=new Date().toISOString().slice(0,10);
  pdf.save(`${rfc}_${stamp}.pdf`);
  setStatus('PDF generado: '+rfc+'_'+stamp+'.pdf — listo para el siguiente cliente.');
  $('btnPdf').disabled=false;
  showCam();
};
</script>
