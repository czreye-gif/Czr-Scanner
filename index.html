<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner — Despacho</title>
<style>
  :root{
    --ink:#16181c; --paper:#faf8f4; --line:#e4ded2;
    --sello:#1f5c4d; --sello-soft:#e6efe9; --sello-deep:#174a3e;
    --warn:#9a4a2f; --muted:#6f695e; --card:#ffffff;
    --r:10px; --rs:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  /* ---- header: membrete fiscal ---- */
  header{
    border-bottom:2px solid var(--ink);
    padding:14px 18px 11px;
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
  }
  .brand h1{
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
    font-size:14px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
  }
  .brand span{font-size:10px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase}
  .folio{
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
    font-size:10px; color:var(--sello); border:1px solid var(--sello);
    padding:3px 8px; border-radius:4px; white-space:nowrap;
  }
  main{max-width:720px; margin:0 auto; padding:16px 14px 90px}

  .field{margin-bottom:12px}
  label.lbl{
    display:block; font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); margin-bottom:5px;
  }
  input[type=text]{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:var(--rs);
    font-family:"SF Mono",ui-monospace,monospace; font-size:14px; background:var(--card);
    text-transform:uppercase; letter-spacing:.05em;
  }
  input[type=text]:focus{outline:none; border-color:var(--sello); box-shadow:0 0 0 3px var(--sello-soft)}

  /* ---- botones base: compactos ---- */
  button{
    border:none; border-radius:var(--rs); cursor:pointer; font-family:inherit;
    font-size:13px; font-weight:600; letter-spacing:.01em;
    padding:0 14px; height:42px;
    transition:transform .05s, opacity .15s, background .15s;
  }
  button:active{transform:scale(.98)}
  button:disabled{opacity:.35; cursor:not-allowed}
  .b-sello{background:var(--sello); color:#fff}
  .b-sello:active{background:var(--sello-deep)}
  .b-primary{background:var(--ink); color:var(--paper)}
  .b-ghost{background:var(--card); color:var(--ink); border:1px solid var(--line)}

  /* ---- hero de captura ---- */
  .capture-hero{
    border:1.5px dashed var(--line); border-radius:var(--r); background:var(--card);
    padding:28px 20px 22px; text-align:center; margin-bottom:12px;
  }
  .hero-icon{font-size:40px; margin-bottom:6px}
  .hero-text{font-size:13px; color:var(--muted); margin:0 auto 18px; max-width:330px}
  .capture-hero button{display:block; width:100%}
  #btnCapture{height:50px; font-size:14px; margin-bottom:8px}
  #btnGallery{height:40px; font-size:12px; font-weight:500}

  /* ---- vista revisión ---- */
  .rev-banner{
    font-family:"SF Mono",ui-monospace,monospace; font-size:10px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--sello);
    padding:0 2px 8px; text-align:center;
  }
  .rev-stage{
    border:1px solid var(--line); border-radius:var(--r); background:#eceadf;
    display:flex; justify-content:center; align-items:center;
    margin-bottom:10px; height:56vh; overflow:hidden; touch-action:none; position:relative;
  }
  .rev-stage img{
    display:block; max-width:96%; max-height:94%; width:auto; height:auto;
    box-shadow:0 3px 22px rgba(20,24,28,.22); background:#fff;
    transform-origin:center center; will-change:transform;
  }
  .rev-stage img.hidden{display:block}
  .zoom-ctrls{position:absolute; bottom:10px; right:10px; display:flex; gap:6px; z-index:5}
  .zoom-ctrls button{
    min-width:38px; height:38px; padding:0 11px; border-radius:19px;
    background:rgba(22,24,28,.78); color:#fff; font-size:17px;
    backdrop-filter:blur(5px); box-shadow:0 2px 10px rgba(0,0,0,.22);
  }
  .zoom-ctrls #zFit{font-size:11px; letter-spacing:.05em}

  /* ---- filtros: control segmentado ---- */
  .filters{
    display:flex; background:var(--card); border:1px solid var(--line);
    border-radius:var(--rs); padding:3px; gap:2px; margin-bottom:10px;
  }
  .f-btn{
    flex:1; height:34px; padding:0 6px; border-radius:6px;
    font-size:12px; font-weight:600; color:var(--muted); background:transparent;
    white-space:nowrap;
  }
  .f-btn.f-active{background:var(--ink); color:var(--paper)}

  /* ---- barra de acciones de revisión ---- */
  .actions{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px}
  .actions .full{grid-column:1 / -1}
  .a-btn{height:42px; font-size:13px}

  .pages{margin-top:16px}
  .pages h2{
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted);
    border-bottom:1px solid var(--line); padding-bottom:5px; margin-bottom:9px;
    display:flex; justify-content:space-between; font-weight:600;
  }
  .thumbs{display:flex; gap:8px; flex-wrap:wrap}
  .thumb{position:relative; width:76px; height:101px; border:1px solid var(--line); border-radius:6px; overflow:hidden; background:#fff}
  .thumb img{width:100%; height:100%; object-fit:cover}
  .thumb .num{
    position:absolute; top:0; left:0; background:var(--ink); color:var(--paper);
    font-family:"SF Mono",monospace; font-size:9px; padding:1px 5px; border-bottom-right-radius:5px;
  }
  .thumb .del{
    position:absolute; bottom:3px; right:3px; background:rgba(154,74,47,.92); color:#fff;
    width:22px; height:22px; min-width:0; padding:0; border-radius:50%; font-size:12px; line-height:1;
  }
  .toggle{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted); margin-top:10px}
  .toggle input{width:16px; height:16px; accent-color:var(--sello)}
  .status{
    font-family:"SF Mono",monospace; font-size:11px; color:var(--sello);
    min-height:16px; margin-top:8px;
  }
  .status.err{color:var(--warn)}
  footer{
    position:fixed; bottom:0; left:0; right:0; background:var(--paper);
    border-top:2px solid var(--ink); padding:10px 14px;
    transition:transform .2s;
  }
  footer.hidden{display:none}
  footer .inner{max-width:720px; margin:0 auto; display:flex; gap:8px}
  footer button{flex:1; height:44px}

  /* ---- editor de esquinas: pantalla completa con lupa ---- */
  .corner-editor{
    position:fixed; inset:0; background:#101214; z-index:60;
    display:flex; flex-direction:column;
  }
  .corner-editor.hidden{display:none}
  .ce-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; color:#e8e5de;
  }
  .ce-head .t{font-size:13px; font-weight:600; letter-spacing:.02em}
  .ce-head .s{font-size:11px; color:#8b877e; margin-top:2px}
  .ce-wrap{
    flex:1; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    touch-action:none; padding:8px;
  }
  .ce-frame{position:relative; max-width:100%; max-height:100%}
  .ce-frame canvas{display:block; max-width:100%; max-height:calc(100vh - 170px); width:auto; height:auto; border-radius:4px}
  .ce-frame svg{position:absolute; inset:0; width:100%; height:100%; overflow:visible}
  .ce-loupe{
    position:absolute; width:128px; height:128px; border-radius:50%;
    border:2.5px solid #fff; box-shadow:0 4px 18px rgba(0,0,0,.5);
    overflow:hidden; display:none; pointer-events:none; z-index:5; background:#000;
  }
  .ce-loupe canvas{width:128px; height:128px}
  .ce-actions{display:flex; gap:8px; padding:12px 16px 18px}
  .ce-actions button{flex:1; height:46px}
  .ce-cancel{background:rgba(255,255,255,.08); color:#e8e5de; border:1px solid rgba(255,255,255,.15)}
  .ce-apply{background:var(--sello); color:#fff}

  .hidden{display:none}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Escáner · Despacho</h1>
    <span>Documentos → PDF</span>
  </div>
  <div class="folio" id="folio">FOLIO —</div>
</header>

<main>
  <div class="field">
    <label class="lbl" for="rfc">RFC / Cliente (nombra el archivo)</label>
    <input type="text" id="rfc" placeholder="XAXX010101000" maxlength="13" autocomplete="off">
  </div>

  <!-- ===== VISTA CÁMARA (usa la cámara nativa de la MatePad) ===== -->
  <section id="viewCam">
    <div class="capture-hero">
      <div class="hero-icon">📄</div>
      <div class="hero-text">Toma la foto del documento con la cámara de tu dispositivo. Se detecta y recorta solo.</div>
      <button class="b-sello b-big" id="btnCapture">📷 Tomar foto del documento</button>
      <input type="file" id="fileCapture" accept="image/*" capture="environment" class="hidden">
      <button class="b-ghost" id="btnGallery">Elegir de la galería</button>
      <input type="file" id="fileGallery" accept="image/*" class="hidden">
    </div>

    <label class="toggle">
      <input type="checkbox" id="ocr"> Reconocer texto (OCR) — hace el PDF buscable, tarda más
    </label>

    <div class="pages hidden" id="pagesBox">
      <h2><span>Páginas capturadas</span><span id="count">0</span></h2>
      <div class="thumbs" id="thumbs"></div>
    </div>
    <!-- canvas de trabajo oculto (se conserva para procesar) -->
    <canvas id="work" class="hidden"></canvas>
  </section>

  <!-- ===== VISTA REVISIÓN ===== -->
  <section id="viewReview" class="hidden">
    <div class="rev-banner" id="revBanner">Página 1</div>
    <div class="rev-stage" id="revStage">
      <img id="preview" alt="Página capturada">
      <div class="zoom-ctrls">
        <button id="zOut" type="button">−</button>
        <button id="zFit" type="button">Ajustar</button>
        <button id="zIn" type="button">+</button>
      </div>
    </div>
    <div class="filters">
      <button class="f-btn" id="f-color">Color</button>
      <button class="f-btn f-active" id="f-gris">Gris</button>
      <button class="f-btn" id="f-byn">B/N texto</button>
    </div>
    <div class="actions">
      <button class="b-ghost a-btn" id="btnCorners">⛶ Esquinas</button>
      <button class="b-ghost a-btn" id="btnRetake">↺ Rehacer</button>
      <button class="b-primary a-btn" id="btnMore">+ Otra página</button>
      <button class="b-sello a-btn" id="btnFinish">✓ Generar PDF</button>
    </div>
    <div class="rev-thumbs-wrap pages hidden" id="revPagesBox">
      <h2><span>Páginas</span><span id="revCount">0</span></h2>
      <div class="thumbs" id="revThumbs"></div>
    </div>
  </section>

  <div class="status" id="status"></div>
</main>

<!-- ===== EDITOR DE ESQUINAS (pantalla completa) ===== -->
<div id="cornerModal" class="corner-editor hidden">
  <div class="ce-head">
    <div>
      <div class="t">Ajustar esquinas</div>
      <div class="s">Arrastra cada esquina · la lupa muestra el punto exacto</div>
    </div>
  </div>
  <div class="ce-wrap" id="cornerArea">
    <div class="ce-frame">
      <canvas id="cornerCanvas"></canvas>
      <svg id="cornerSvg"></svg>
    </div>
    <div class="ce-loupe" id="loupe"><canvas id="loupeCanvas" width="128" height="128"></canvas></div>
  </div>
  <div class="ce-actions">
    <button class="ce-cancel" id="cornerCancel">Cancelar</button>
    <button class="ce-apply" id="cornerApply">Aplicar recorte</button>
  </div>
</div>

<footer>
  <div class="inner">
    <button class="b-ghost" id="btnClear" disabled>Vaciar</button>
    <button class="b-sello" id="btnPdf" disabled>Generar PDF</button>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script>
/* ---------- estado ---------- */
const pages = []; // {dataUrl, w, h}
let stream = null;
let cvReady = false;

const $ = id => document.getElementById(id);
const work=$('work'), preview=$('preview');
const status=$('status');

function setStatus(msg, err=false){ status.textContent=msg; status.className='status'+(err?' err':''); }
$('folio').textContent = 'FOLIO ' + new Date().toISOString().slice(0,10).replace(/-/g,'');

/* ---------- OpenCV carga diferida (solo si se necesita) ---------- */
function loadCV(){
  return new Promise((res,rej)=>{
    if(cvReady) return res();
    setStatus('Cargando motor de detección…');
    const sources=[
      'https://docs.opencv.org/4.10.0/opencv.js',
      'https://docs.opencv.org/4.8.0/opencv.js',
      'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js'
    ];
    let idx=0;
    const ready=()=>{
      if(window.cv && cv.getBuildInformation){ cvReady=true; setStatus(''); res(); }
      else { cv['onRuntimeInitialized']=()=>{ cvReady=true; setStatus(''); res(); }; }
    };
    const tryNext=()=>{
      if(idx>=sources.length){ rej(new Error('No se pudo cargar OpenCV desde ninguna fuente')); return; }
      const s=document.createElement('script');
      s.src=sources[idx++];
      s.onload=ready;
      s.onerror=()=>{ setStatus('Reintentando con otra fuente…'); tryNext(); };
      document.body.appendChild(s);
    };
    tryNext();
  });
}

/* ---------- captura con cámara nativa de la MatePad ---------- */

// el botón principal abre la cámara del sistema (con flash y buena definición)
$('btnCapture').onclick = ()=> $('fileCapture').click();
$('btnGallery').onclick = ()=> $('fileGallery').click();

function handleIncomingFile(e){
  const f=e.target.files[0];
  e.target.value=''; // permite volver a elegir la misma foto
  if(!f) return;
  setStatus('Procesando imagen…');
  const img=new Image();
  img.onload=()=>{
    processSource(img, img.naturalWidth, img.naturalHeight);
  };
  img.onerror=()=> setStatus('No se pudo leer la imagen.', true);
  img.src=URL.createObjectURL(f);
}
$('fileCapture').onchange = handleIncomingFile;
$('fileGallery').onchange = handleIncomingFile;

/* ---------- pipeline: detectar bordes + enderezar + limpiar ---------- */
async function processSource(src, w, h){
  try{
    await loadCV();
    setStatus('Procesando…');
    work.width=w; work.height=h;
    work.getContext('2d').drawImage(src,0,0,w,h);

    let bestQuad=null;

    // detección sobre versión reducida (rápida), con dos pasadas de sensibilidad
    {
      const DW=500, sc=DW/w, dw=DW, dh=Math.round(h*sc);
      const small=document.createElement('canvas'); small.width=dw; small.height=dh;
      small.getContext('2d').drawImage(work,0,0,dw,dh);

      const tryDetect=(lo,hi,minFrac)=>{
        let img=cv.imread(small), gray=new cv.Mat(), edges=new cv.Mat();
        cv.cvtColor(img,gray,cv.COLOR_RGBA2GRAY);
        cv.GaussianBlur(gray,gray,new cv.Size(5,5),0);
        cv.Canny(gray,edges,lo,hi);
        cv.dilate(edges,edges,cv.Mat.ones(5,5,cv.CV_8U));
        let contours=new cv.MatVector(), hier=new cv.Mat();
        cv.findContours(edges,contours,hier,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);
        let q=null, bestArea=dw*dh*minFrac;
        for(let i=0;i<contours.size();i++){
          const c=contours.get(i), peri=cv.arcLength(c,true), ap=new cv.Mat();
          cv.approxPolyDP(c,ap,0.03*peri,true);
          const area=Math.abs(cv.contourArea(ap));
          if(ap.rows===4 && area>bestArea){
            bestArea=area;
            q=[]; for(let k=0;k<4;k++) q.push({x:ap.data32S[k*2]/sc, y:ap.data32S[k*2+1]/sc});
          }
          ap.delete(); c.delete();
        }
        img.delete();gray.delete();edges.delete();contours.delete();hier.delete();
        return q;
      };

      // pasada normal; si no encuentra, pasada sensible (para fotos ya limpias/claras)
      bestQuad = tryDetect(40,120,0.12) || tryDetect(15,60,0.10);
    }

    // si no detecta (ej. foto del modo escanear ya recortada), usa el marco completo
    // con un margen mínimo: queda lista tal cual y las manijas son alcanzables
    const m=Math.round(Math.min(w,h)*0.01);
    const quad = bestQuad ? orderQuad(bestQuad)
                          : [{x:m,y:m},{x:w-m,y:m},{x:w-m,y:h-m},{x:m,y:h-m}];

    // guardamos el CRUDO a color + esquinas; el enderezado se hace al renderizar
    addPage(work2canvas(work), quad, !!bestQuad);
  }catch(e){ setStatus('Error al procesar: '+e.message, true); }
}

// copia el canvas de trabajo a uno independiente
function work2canvas(srcCanvas){
  const c=document.createElement('canvas'); c.width=srcCanvas.width; c.height=srcCanvas.height;
  c.getContext('2d').drawImage(srcCanvas,0,0);
  return c;
}

// ordena 4 puntos como TL, TR, BR, BL
function orderQuad(pts){
  const s=pts.slice().sort((a,b)=>a.y-b.y);
  const top=s.slice(0,2).sort((a,b)=>a.x-b.x);
  const bot=s.slice(2,4).sort((a,b)=>a.x-b.x);
  return [top[0], top[1], bot[1], bot[0]]; // TL,TR,BR,BL
}

// endereza un canvas crudo usando 4 esquinas (TL,TR,BR,BL) -> nuevo canvas
function warpCanvas(srcCanvas, quad){
  if(!(window.cv && cv.imread)) return srcCanvas;
  let img=cv.imread(srcCanvas);
  const [tl,tr,br,bl]=quad;
  const dist=(p,q)=>Math.hypot(p.x-q.x,p.y-q.y);
  const W=Math.max(dist(tl,tr),dist(bl,br))|0;
  const H=Math.max(dist(tl,bl),dist(tr,br))|0;
  const srcM=cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
  const dstM=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,W,0,W,H,0,H]);
  const M=cv.getPerspectiveTransform(srcM,dstM), dst=new cv.Mat();
  cv.warpPerspective(img,dst,M,new cv.Size(W,H));
  const cnv=document.createElement('canvas'); cv.imshow(cnv,dst);
  img.delete();srcM.delete();dstM.delete();M.delete();dst.delete();
  return cnv;
}

/* ---------- filtros de color ---------- */
// estima el mapa de iluminación y corrige sombras de forma SUAVE,
// trabajando sobre una versión reducida para no degradar ni tardar
function deshadow(srcCanvas, intensity){
  intensity = (intensity==null) ? 0.5 : intensity;
  const W=srcCanvas.width, H=srcCanvas.height;
  // 1) versión pequeña para estimar el fondo (la sombra es de baja frecuencia)
  const sw=Math.max(40, Math.round(W/24)), sh=Math.max(40, Math.round(H/24));
  const small=document.createElement('canvas'); small.width=sw; small.height=sh;
  const sctx=small.getContext('2d');
  sctx.drawImage(srcCanvas,0,0,sw,sh);
  const bg=sctx.getImageData(0,0,sw,sh).data;

  // 2) sacar el brillo máximo del fondo (lo que debería ser "blanco de hoja")
  let maxL=1;
  for(let i=0;i<bg.length;i+=4){
    const l=0.299*bg[i]+0.587*bg[i+1]+0.114*bg[i+2];
    if(l>maxL) maxL=l;
  }

  // 3) aplicar corrección sobre la imagen full: cada pixel se divide
  //    entre su iluminación local (interpolada del mapa pequeño) y se reescala
  const out=document.createElement('canvas'); out.width=W; out.height=H;
  const octx=out.getContext('2d'); octx.drawImage(srcCanvas,0,0);
  const d=octx.getImageData(0,0,W,H), p=d.data;
  const sampleBg=(x,y)=>{
    const bx=Math.min(sw-1, Math.floor(x/W*sw)), by=Math.min(sh-1, Math.floor(y/H*sh));
    const idx=(by*sw+bx)*4;
    return 0.299*bg[idx]+0.587*bg[idx+1]+0.114*bg[idx+2];
  };
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      let local=sampleBg(x,y); if(local<1) local=1;
      const gain=maxL/local;
      // intensidad: 0 = nada, 1 = corrección completa
      const g=1 + (gain-1)*intensity;
      const gg=Math.min(1.6, Math.max(0.7, g));
      p[i]=Math.min(255,p[i]*gg);
      p[i+1]=Math.min(255,p[i+1]*gg);
      p[i+2]=Math.min(255,p[i+2]*gg);
    }
  }
  octx.putImageData(d,0,0);
  return out;
}

// devuelve un nuevo canvas con el filtro aplicado sobre el canvas original a color
function applyFilter(srcCanvas, mode){
  let base=srcCanvas;
  // Gris: corrección de sombra MUY leve. B/N: leve. Color: nada.
  if(mode==='gris'){
    try{ base=deshadow(srcCanvas, 0.12); }catch(e){ base=srcCanvas; }
  } else if(mode==='byn'){
    try{ base=deshadow(srcCanvas, 0.38); }catch(e){ base=srcCanvas; }
  }
  const c=document.createElement('canvas');
  c.width=base.width; c.height=base.height;
  const ctx=c.getContext('2d');
  ctx.drawImage(base,0,0);

  const W=c.width, H=c.height;
  const d=ctx.getImageData(0,0,W,H), p=d.data;

  if(mode==='color'){
    // realce suave: más contraste y un punto menos de brillo (anti "muy clara")
    for(let i=0;i<p.length;i+=4){
      for(let k=0;k<3;k++){
        let v=p[i+k];
        v=(v-128)*1.15+128-6;           // contraste + leve oscurecida
        v=255*Math.pow(Math.max(0,v)/255, 1.08); // gamma para dar cuerpo
        p[i+k]=v<0?0:v>255?255:v;
      }
    }
    ctx.putImageData(d,0,0);
    return c;
  }

  if(mode==='gris'){
    for(let i=0;i<p.length;i+=4){
      let g=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
      // contraste centrado sin sumar brillo; gamma >1 oscurece tonos medios (letras)
      g=(g-128)*1.12+128;
      g=255*Math.pow(Math.max(0,g)/255, 1.12); // gamma: oscurece un poco las letras
      g=g<0?0:g>255?255:g;
      p[i]=p[i+1]=p[i+2]=g;
    }
  } else if(mode==='byn'){
    // umbral global sobre la imagen ya nivelada
    let sum=0, n=p.length/4;
    for(let i=0;i<p.length;i+=4) sum+=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
    const mean=sum/n, thr=mean*0.86; // letras marcadas sin ensuciar el fondo
    const bin=new Uint8Array(W*H);
    for(let i=0,j=0;i<p.length;i+=4,j++){
      bin[j]=(0.299*p[i]+0.587*p[i+1]+0.114*p[i+2])>thr?255:0;
    }
    // limpieza: quita píxeles negros aislados (ruido), conserva trazos de texto.
    // un negro rodeado de muchos blancos es ruido -> se vuelve blanco.
    const clean=new Uint8Array(W*H);
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const j=y*W+x;
        if(bin[j]===255){ clean[j]=255; continue; }
        // contar vecinos negros en 3x3
        let blacks=0;
        for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
          const ny=y+dy, nx=x+dx;
          if(ny>=0&&ny<H&&nx>=0&&nx<W && bin[ny*W+nx]===0) blacks++;
        }
        // si está casi solo (≤2 vecinos negros), es ruido -> blanco
        clean[j]=(blacks<=2)?255:0;
      }
    }
    for(let i=0,j=0;i<p.length;i+=4,j++){ p[i]=p[i+1]=p[i+2]=clean[j]; }
  }
  ctx.putImageData(d,0,0);
  return c;
}

/* ---------- zoom en vista previa ---------- */
(function(){
  const img=$('preview'), box=$('revStage');
  let scale=1, tx=0, ty=0;
  let startDist=0, startScale=1, lastX=0, lastY=0, panning=false;

  function apply(){ img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }
  function reset(){ scale=1; tx=0; ty=0; apply(); }
  // resetear cada vez que cambie la imagen
  const obs=new MutationObserver(reset);
  obs.observe(img,{attributes:true, attributeFilter:['src']});

  const dist=(t)=>Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);

  box.addEventListener('touchstart',(e)=>{
    if(e.touches.length===2){ startDist=dist(e.touches); startScale=scale; }
    else if(e.touches.length===1 && scale>1){
      panning=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    }
  },{passive:false});

  box.addEventListener('touchmove',(e)=>{
    if(e.touches.length===2){
      e.preventDefault();
      scale=Math.min(5, Math.max(1, startScale*(dist(e.touches)/startDist)));
      if(scale===1){ tx=0; ty=0; }
      apply();
    } else if(panning && e.touches.length===1){
      e.preventDefault();
      tx+=e.touches[0].clientX-lastX; ty+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
      apply();
    }
  },{passive:false});

  box.addEventListener('touchend',(e)=>{ if(e.touches.length===0) panning=false; });

  // doble toque: alterna entre 1x y 2.5x
  let lastTap=0;
  box.addEventListener('touchend',(e)=>{
    const now=Date.now();
    if(now-lastTap<300){ scale = scale>1 ? 1 : 2.5; if(scale===1){tx=0;ty=0;} apply(); }
    lastTap=now;
  });

  // soporte mouse (escritorio): rueda para zoom
  box.addEventListener('wheel',(e)=>{
    e.preventDefault();
    scale=Math.min(5, Math.max(1, scale + (e.deltaY<0?0.2:-0.2)));
    if(scale===1){tx=0;ty=0;} apply();
  },{passive:false});

  // botones visibles
  function zoomBy(f){ scale=Math.min(5,Math.max(1, scale*f)); if(scale<=1){scale=1;tx=0;ty=0;} apply(); }
  $('zIn').onclick =(e)=>{ e.stopPropagation(); zoomBy(1.4); };
  $('zOut').onclick=(e)=>{ e.stopPropagation(); zoomBy(1/1.4); };
  $('zFit').onclick=(e)=>{ e.stopPropagation(); reset(); };
})();

function showCam(){
  $('viewReview').classList.add('hidden');
  $('viewCam').classList.remove('hidden');
  document.querySelector('footer').classList.remove('hidden');
}
function showReview(){
  $('viewCam').classList.add('hidden');
  $('viewReview').classList.remove('hidden');
  document.querySelector('footer').classList.add('hidden');
}

/* ---------- gestión de páginas ---------- */
let currentFilter='gris'; // filtro por defecto para texto fiscal

// recalcula el enderezado y el filtro de una página
function renderPageFilter(i){
  const pg=pages[i];
  // 1) enderezar el crudo con las esquinas actuales (cacheado si no cambió)
  if(!pg.warped || pg.warpDirty){
    pg.warped = warpCanvas(pg.raw, pg.quad);
    pg.warpDirty=false;
  }
  // 2) aplicar filtro
  const filtered=applyFilter(pg.warped, pg.filter);
  pg.dataUrl=filtered.toDataURL('image/jpeg',0.95);
  pg.w=filtered.width; pg.h=filtered.height;
}

function addPage(rawCanvas, quad, enderezada){
  const pg={raw:rawCanvas, quad:quad, warped:null, warpDirty:true,
            filter:currentFilter, dataUrl:'', w:0, h:0};
  pages.push(pg);
  renderPageFilter(pages.length-1);
  preview.src=pg.dataUrl;
  const mp=((pg.w*pg.h)/1e6).toFixed(1);
  $('revBanner').textContent='Página '+pages.length+(enderezada?' · auto':' · sin recorte')+' · '+pg.w+'×'+pg.h+' ('+mp+' MP)';
  markFilterButtons(pg.filter);
  renderThumbs();
  showReview();
  setStatus('Revisa la página. Ajusta esquinas o filtro si hace falta.');
}

// aplica filtro a la página que se está revisando (la última)
function setReviewFilter(mode){
  if(!pages.length) return;
  const i=pages.length-1;
  pages[i].filter=mode; currentFilter=mode;
  markFilterButtons(mode);
  if(mode==='byn') setStatus('Procesando B/N…');
  // dejar pintar el estado antes del cálculo pesado
  setTimeout(()=>{
    renderPageFilter(i);
    preview.src=pages[i].dataUrl;
    renderThumbs();
    setStatus(mode==='byn'?'B/N listo.':'');
  }, 20);
}
function markFilterButtons(mode){
  ['color','gris','byn'].forEach(m=>{
    const b=$('f-'+m); if(b) b.classList.toggle('f-active', m===mode);
  });
}
['color','gris','byn'].forEach(m=>{
  const b=$('f-'+m); if(b) b.onclick=()=>setReviewFilter(m);
});

function renderThumbs(){
  $('count').textContent=pages.length;
  $('revCount').textContent=pages.length;
  [['pagesBox','thumbs'],['revPagesBox','revThumbs']].forEach(([boxId,tId])=>{
    const box=$(boxId), t=$(tId);
    box.classList.toggle('hidden', pages.length===0);
    t.innerHTML='';
    pages.forEach((pg,i)=>{
      const d=document.createElement('div'); d.className='thumb';
      d.innerHTML=`<span class="num">${String(i+1).padStart(2,'0')}</span><img src="${pg.dataUrl}">`;
      const x=document.createElement('button'); x.className='del'; x.textContent='×';
      x.onclick=()=>{ pages.splice(i,1); renderThumbs(); if(pages.length===0) showCam(); };
      d.appendChild(x); t.appendChild(d);
    });
  });
  const has=pages.length>0;
  $('btnPdf').disabled=!has; $('btnClear').disabled=!has;
}

/* ---- botones de la vista revisión ---- */
$('btnRetake').onclick=()=>{           // descarta la última y vuelve a tomar
  pages.pop(); renderThumbs(); showCam();
  setStatus('Página descartada. Toma la foto de nuevo.');
  $('fileCapture').click();
};
$('btnMore').onclick=()=>{             // conserva y vuelve a tomar otra
  showCam();
  setStatus('Página guardada. Toma la siguiente.');
  $('fileCapture').click();
};
$('btnFinish').onclick=()=>{ $('btnPdf').click(); };

/* ---------- editor de esquinas: pantalla completa + lupa ---------- */
let cornerPts=[], cornerScale=1, dragIdx=-1, ceRaw=null;

$('btnCorners').onclick=()=>{
  if(!pages.length) return;
  const pg=pages[pages.length-1];
  ceRaw=pg.raw;
  const cv2=$('cornerCanvas'), ctx=cv2.getContext('2d');
  // canvas a resolución alta para que se vea nítido (CSS lo escala)
  const maxW=1100, scale=Math.min(1, maxW/ceRaw.width);
  cv2.width=Math.round(ceRaw.width*scale); cv2.height=Math.round(ceRaw.height*scale);
  ctx.drawImage(ceRaw,0,0,cv2.width,cv2.height);
  cornerScale=scale;
  // svg con el MISMO sistema de coordenadas que el canvas (sin importar tamaño CSS)
  $('cornerSvg').setAttribute('viewBox','0 0 '+cv2.width+' '+cv2.height);
  cornerPts=pg.quad.map(p=>({x:p.x*scale, y:p.y*scale}));
  dragIdx=-1;
  drawCorners();
  $('cornerModal').classList.remove('hidden');
};

function drawCorners(){
  const svg=$('cornerSvg'), W=$('cornerCanvas').width;
  const R=Math.max(18, W*0.035);           // radio de manija proporcional
  const poly=cornerPts.map(p=>p.x+','+p.y).join(' ');
  let h='<polygon points="'+poly+'" fill="rgba(31,92,77,0.10)" stroke="#2ecc8f" stroke-width="'+(W*0.004)+'"/>';
  cornerPts.forEach((p,i)=>{
    const a=i===dragIdx;
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(a?R*1.25:R)+'" fill="rgba(46,204,143,'+(a?'0.30':'0.16')+'" stroke="#2ecc8f" stroke-width="'+(W*0.005)+'"/>';
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(W*0.006)+'" fill="#2ecc8f"/>';
  });
  svg.innerHTML=h;
}

// pointer -> coords del canvas (vía viewBox compartido)
function cePos(e){
  const cv2=$('cornerCanvas'), r=cv2.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(cv2.width/r.width), y:(e.clientY-r.top)*(cv2.height/r.height)};
}

const ceArea=$('cornerArea');
ceArea.addEventListener('pointerdown',(e)=>{
  if(!ceRaw) return;
  const pos=cePos(e);
  const W=$('cornerCanvas').width;
  let nearest=-1, nd=1e9;
  cornerPts.forEach((p,i)=>{ const d=Math.hypot(p.x-pos.x,p.y-pos.y); if(d<nd){nd=d;nearest=i;} });
  // agarre generoso: hasta 12% del ancho de distancia
  if(nd < W*0.12){
    dragIdx=nearest;
    ceArea.setPointerCapture(e.pointerId);
    movePoint(pos); // engancha de inmediato
    e.preventDefault();
  }
});
ceArea.addEventListener('pointermove',(e)=>{
  if(dragIdx<0) return;
  e.preventDefault();
  movePoint(cePos(e), e.clientX, e.clientY);
});
ceArea.addEventListener('pointerup',()=>{ dragIdx=-1; $('loupe').style.display='none'; drawCorners(); });
ceArea.addEventListener('pointercancel',()=>{ dragIdx=-1; $('loupe').style.display='none'; drawCorners(); });

function movePoint(pos, clientX, clientY){
  const cv2=$('cornerCanvas');
  cornerPts[dragIdx]={x:Math.max(0,Math.min(cv2.width,pos.x)), y:Math.max(0,Math.min(cv2.height,pos.y))};
  drawCorners();
  updateLoupe(clientX, clientY);
}

// lupa: muestra ampliado el punto exacto, lejos del dedo
function updateLoupe(clientX, clientY){
  if(dragIdx<0) return;
  const lp=$('loupe'), lc=$('loupeCanvas').getContext('2d');
  const p=cornerPts[dragIdx];
  // región del crudo alrededor de la esquina (en coords del crudo)
  const rx=p.x/cornerScale, ry=p.y/cornerScale;
  const Z=3, half=128/(2*Z); // zoom 3x
  lc.fillStyle='#000'; lc.fillRect(0,0,128,128);
  lc.drawImage(ceRaw, rx-half, ry-half, half*2, half*2, 0, 0, 128, 128);
  // cruz del punto exacto
  lc.strokeStyle='#2ecc8f'; lc.lineWidth=1.5;
  lc.beginPath(); lc.moveTo(64,46); lc.lineTo(64,82); lc.moveTo(46,64); lc.lineTo(82,64); lc.stroke();
  // posicionar la lupa en la esquina opuesta al dedo
  const wrap=ceArea.getBoundingClientRect();
  const onLeft = clientX!=null ? (clientX-wrap.left) < wrap.width/2 : true;
  const onTop  = clientY!=null ? (clientY-wrap.top)  < wrap.height/2 : true;
  lp.style.left = onLeft ? 'auto' : '14px';
  lp.style.right = onLeft ? '14px' : 'auto';
  lp.style.top = onTop ? 'auto' : '14px';
  lp.style.bottom = onTop ? '14px' : 'auto';
  lp.style.display='block';
}

$('cornerCancel').onclick=()=>{ $('cornerModal').classList.add('hidden'); $('loupe').style.display='none'; };
$('cornerApply').onclick=()=>{
  const pg=pages[pages.length-1];
  pg.quad=orderQuad(cornerPts.map(p=>({x:p.x/cornerScale, y:p.y/cornerScale})));
  pg.warpDirty=true;
  $('cornerModal').classList.add('hidden');
  $('loupe').style.display='none';
  setStatus('Reaplicando recorte…');
  setTimeout(()=>{
    renderPageFilter(pages.length-1);
    preview.src=pages[pages.length-1].dataUrl;
    renderThumbs();
    setStatus('Recorte actualizado.');
  },20);
};


$('btnClear').onclick=()=>{ pages.length=0; renderThumbs(); showCam(); setStatus('Vaciado.'); };

/* ---------- generar PDF ---------- */
$('btnPdf').onclick = async ()=>{
  if(!pages.length) return;
  const { jsPDF } = window.jspdf;
  const rfc=($('rfc').value.trim()||'documento').replace(/[^A-Za-z0-9]/g,'');
  $('btnPdf').disabled=true;

  let ocrText='';
  if($('ocr').checked){
    setStatus('Reconociendo texto… (puede tardar)');
    try{
      const worker=await Tesseract.createWorker('spa');
      for(let i=0;i<pages.length;i++){
        setStatus(`OCR página ${i+1}/${pages.length}…`);
        const r=await worker.recognize(pages[i].dataUrl);
        ocrText+='\n\n=== Página '+(i+1)+' ===\n'+r.data.text;
      }
      await worker.terminate();
    }catch(e){ setStatus('OCR falló, genero PDF sin texto.', true); }
  }

  setStatus('Armando PDF…');
  const pdf=new jsPDF({unit:'pt',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(), pmh=pdf.internal.pageSize.getHeight(), m=24;
  pages.forEach((pg,i)=>{
    if(i>0) pdf.addPage();
    const maxW=pw-m*2, maxH=pmh-m*2;
    let r=Math.min(maxW/pg.w, maxH/pg.h);
    const dw=pg.w*r, dh=pg.h*r;
    pdf.addImage(pg.dataUrl,'JPEG',(pw-dw)/2,(pmh-dh)/2,dw,dh);
  });
  if(ocrText.trim()){
    pdf.addPage();
    pdf.setFont('courier','normal'); pdf.setFontSize(9);
    pdf.text('TEXTO RECONOCIDO (OCR)',m,m+6);
    pdf.setFontSize(8);
    pdf.text(pdf.splitTextToSize(ocrText.trim(), pw-m*2), m, m+24);
  }
  const stamp=new Date().toISOString().slice(0,10);
  pdf.save(`${rfc}_${stamp}.pdf`);
  setStatus('PDF generado: '+rfc+'_'+stamp+'.pdf — listo para el siguiente cliente.');
  $('btnPdf').disabled=false;
  showCam();
};
</script>
